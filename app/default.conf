server {
    listen       80;
    server_name  localhost;
    root         /usr/share/nginx/html;
    index        index.html;

    # config.js is rendered per-environment at container start; never let the
    # browser cache it (otherwise re-using the same localhost port across
    # environments shows a stale Lambda URL / stage).
    location = /config.js {
        add_header Cache-Control "no-store" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
