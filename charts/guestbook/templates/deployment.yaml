apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "guestbook.name" . }}
  labels:
    {{- include "guestbook.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      {{- include "guestbook.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "guestbook.selectorLabels" . | nindent 8 }}
      annotations:
        # Roll pods when the promoted Lambda URL changes so config.js is re-rendered.
        kargo.akuity.io/lambda-url: {{ .Values.env.LAMBDA_URL | quote }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: guestbook
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            - name: STAGE
              value: {{ .Values.stage | quote }}
            - name: LAMBDA_URL
              value: {{ .Values.env.LAMBDA_URL | quote }}
          readinessProbe:
            httpGet:
              path: /
              port: http
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
