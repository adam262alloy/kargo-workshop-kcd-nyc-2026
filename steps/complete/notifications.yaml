# Email (SMTP) notifications. The MessageChannel holds the SMTP connection; the
# EventRouter subscribes to promotion events and renders an email per event.
apiVersion: ee.kargo.akuity.io/v1alpha1
kind: MessageChannel
metadata:
  name: email
  namespace: guestbook
spec:
  # Secret must contain keys: username, password (an app password for Gmail).
  secretRef:
    name: smtp-credentials
  smtp:
    # `from` must match the authenticated SMTP account.
    from: REPLACE_WITH_SMTP_FROM_ADDRESS
    to:
      - your@email.address
    host: smtp.gmail.com
    port: 587
    useTLS: true
---
apiVersion: ee.kargo.akuity.io/v1alpha1
kind: EventRouter
metadata:
  name: promotion-status
  namespace: guestbook
  annotations:
    argocd.argoproj.io/sync-wave: "1" # after the channel
spec:
  types:
    - PromotionSucceeded
    - PromotionFailed
    - PromotionErrored
  channels:
    - name: email
      kind: MessageChannel
      encodingType: yaml
      output: |
        to: [your@email.address]
        subject: "[Kargo] ${{ type }} — ${{ event.project }}/${{ event.stageName }}"
        html: false
        body: |
          Project:   ${{ event.project }}
          Stage:     ${{ event.stageName }}
          Promotion: ${{ event.name }}
          Result:    ${{ type }}
